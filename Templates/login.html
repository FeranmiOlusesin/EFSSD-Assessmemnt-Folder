{% extends "base.html" %}

{% block content %}

    <h1 class="mb-3">Log in</h1>
    <p class="page-intro">Enter your username and password to access your cart and orders.</p>
    <hr class="my-4">

    <form method="post" class="row gy-3 w-100">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="col-12 col-lg-10 col-xxl-8">
            <div class="form-floating mb-2 mb-lg-0">
                <input name="username" type="text" class="form-control" id="username" placeholder="Username" value="{{ request.form.get('username', '') }}" required autocomplete="username">
                <label for="username">Username</label>
            </div>
        </div>
        <div class="col-12 col-lg-10 col-xxl-8">
            <div class="form-floating mb-2 mb-lg-0">
                <input name="password" type="password" class="form-control" id="password" placeholder="Password" required autocomplete="current-password">
                <label for="password">Password</label>
            </div>
        </div>
        <div class="col-12 mt-2">
            <button type="submit" class="btn btn-success btn-lg px-5">Log in</button>
        </div>
    </form>

{% endblock %}

{% block sidebarContent %}
    <div class="card sidebar-card mt-3">
        <div class="card-body text-center py-4">
            <h2 class="h6 card-title">New here?</h2>
            <p class="small text-muted mb-3">Create an account to save details and track orders.</p>
            <a href="{{ url_for('register') }}" class="btn btn-brand w-100">Register</a>
        </div>
    </div>
{% endblock %}
