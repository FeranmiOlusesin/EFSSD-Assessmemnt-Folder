{% extends "base.html" %}

{% block content %}

<h1>Update Product</h1>
<hr>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input
            type="text"
            name="name"
            class="form-control"
            value="{{ product['name'] }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea
            name="description"
            class="form-control"
            rows="4"
            required
        >{{ product['description'] }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Category</label>

        <select name="category_id" class="form-select" required>

            {% for category in categories %}

                <option
                    value="{{ category['id'] }}"
                    {% if category['id'] == product['category_id'] %}
                        selected
                    {% endif %}
                >
                    {{ category['name'] }}
                </option>

            {% endfor %}

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Price (£)</label>
        <input
            type="number"
            step="0.01"
            name="price_gbp"
            class="form-control"
            value="{{ product['price_gbp'] }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Unit</label>
        <input
            type="text"
            name="unit"
            class="form-control"
            value="{{ product['unit'] }}"
            required
        >
    </div>

    <div class="mb-3">
        <label class="form-label">Image URL</label>
        <input
            type="text"
            name="image"
            class="form-control"
            value="{{ product['image'] }}"
        >
    </div>

    <div class="mb-3">
        <label class="form-label">In Stock</label>

        <select name="in_stock" class="form-select">

            <option value="1"
                {% if product['in_stock'] == 1 %}
                    selected
                {% endif %}
            >
                Yes
            </option>

            <option value="0"
                {% if product['in_stock'] == 0 %}
                    selected
                {% endif %}
            >
                No
            </option>

        </select>
    </div>

    <button type="submit" class="btn btn-primary">
        Update Product
    </button>

</form>

{% endblock %}
