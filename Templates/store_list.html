{% extends "base.html" %}

{% block content %}

<h1>Stores</h1>
<hr>

<div class="row g-3">
    {% if stores|length == 0 %}
        <div class="alert alert-info">No stores available at the moment.</div>
    {% else %}
        {% for store in stores %}
        <div class="col-sm-6 col-lg-4">
            <div class="card h-100">
                <img src="{{ store['image_url'] or url_for('static', filename='default_store.png') }}" class="card-img-top" alt="{{ store['name'] }}">
                <div class="card-body">
                    <h5 class="card-title">{{ store['name'] }}</h5>
                    <div class="badge text-bg-secondary mb-2">{{ store['category'] }}</div>
                    <p class="card-text text-muted">{{ store['address'] }}</p>
                    <a href="{{ url_for('store_detail', id=store['id']) }}" class="btn btn-outline-primary btn-sm">View Store</a>
                </div>
            </div>
        </div>
        {% endfor %}
    {% endif %}
</div>

{% endblock %}
