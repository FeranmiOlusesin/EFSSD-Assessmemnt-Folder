{% extends "base.html" %}

{% block content %}

{% if is_admin %}
<div class="d-flex justify-content-end mb-2">
    <a href="{{ url_for('update_product', id=product['id']) }}" class="btn btn-primary btn-sm">Edit product</a>
</div>
{% endif %}

<h1 class="h2 mb-3">{{ product['name'] }}</h1>

<div class="row g-4 align-items-start">
    <div class="col-md-5">
        <figure class="mb-0 p-3 rounded bg-white border">
            <img src="{{ product['image'] }}" alt="Image for {{ product['name'] }}" class="img-fluid rounded w-100" style="max-height: 360px; object-fit: contain;">
        </figure>
    </div>
    <div class="col-md-7">
        <div class="card border-0 shadow-sm h-100">
            <div class="card-body p-4">
                <span class="badge bg-secondary">{{ product['category'] }}</span>
                <p class="small text-muted mt-2 mb-2">Sold by: {{ product['store_name'] }}</p>
                <p class="display-6 fs-3 fw-bold mb-3">£{{ product['price_gbp'] }}</p>
                <p class="card-text">{{ product['description'] }}</p>
                <a href="{{ url_for('product_list') }}" class="btn btn-outline-secondary mt-2">Back to products</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
